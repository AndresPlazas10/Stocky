name: Performance Budget

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "src/**"
      - "scripts/perf/**"
      - "scripts/realtime-audit/**"
      - "supabase/migrations/**"
      - "package.json"
      - ".github/workflows/perf-budget.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  perf-budget-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      REALTIME_TEST_BUSINESS_ID: ${{ secrets.REALTIME_TEST_BUSINESS_ID }}
      REALTIME_OWNER_EMAIL: ${{ secrets.REALTIME_OWNER_EMAIL }}
      REALTIME_OWNER_PASSWORD: ${{ secrets.REALTIME_OWNER_PASSWORD }}
      REALTIME_EMPLOYEE_EMAIL: ${{ secrets.REALTIME_EMPLOYEE_EMAIL }}
      REALTIME_EMPLOYEE_PASSWORD: ${{ secrets.REALTIME_EMPLOYEE_PASSWORD }}
      PERF_BASELINE_RUNS: "7"
      PERF_BASELINE_WARMUP: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run performance baseline
        run: npm run audit:perf:baseline -- --out-json testing/perf/perf-current.json --out-md docs/perf/PERF_CURRENT.md

      - name: Validate performance budget gate
        id: budget_gate
        continue-on-error: true
        run: npm run audit:perf:budget -- --current testing/perf/perf-current.json --budget testing/perf/perf-budget.json

      - name: Build PR p95 diff
        if: always()
        run: npm run audit:perf:pr-diff -- --current testing/perf/perf-current.json --budget testing/perf/perf-budget.json --out-md testing/perf/perf-pr-diff.md --out-json testing/perf/perf-pr-diff.json

      - name: Publish PR p95 diff comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- perf-budget-diff-comment -->';
            const diffPath = 'testing/perf/perf-pr-diff.md';
            if (!fs.existsSync(diffPath)) {
              core.warning(`No se encontró ${diffPath}.`);
              return;
            }

            const body = `${marker}\n${fs.readFileSync(diffPath, 'utf8')}`;
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );

            const existing = comments.find((comment) =>
              comment?.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail workflow when budget gate fails
        if: ${{ steps.budget_gate.outcome != 'success' }}
        run: exit 2

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-budget-artifacts
          path: |
            testing/perf/perf-current.json
            docs/perf/PERF_CURRENT.md
            testing/perf/perf-budget.json
            testing/perf/perf-pr-diff.md
            testing/perf/perf-pr-diff.json
          if-no-files-found: warn
