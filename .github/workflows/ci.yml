name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-quality:
    name: Web quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Offline tests
        run: npm run test:offline

      - name: Build
        run: npm run build
